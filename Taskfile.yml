version: "3"

vars:
  TARGET: ./cmd/betteralign
  GIT_LAST_TAG:
    sh: git describe --abbrev=0 --tags 2>/dev/null || echo latest
  GIT_HEAD_COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo unknown
  GIT_TAG_COMMIT:
    sh: git rev-parse --short {{.GIT_LAST_TAG}} 2>/dev/null || echo unknown
  GIT_MODIFIED1:
    sh: git diff {{.GIT_HEAD_COMMIT}} {{.GIT_TAG_COMMIT}} --quiet 2>/dev/null || echo .dev
  GIT_MODIFIED2:
    sh: git diff --quiet 2>/dev/null || echo .dirty
  GIT_MODIFIED:
    sh: echo "{{.GIT_MODIFIED1}}{{.GIT_MODIFIED2}}"
  BUILD_DATE:
    sh: date -u '+%Y-%m-%dT%H:%M:%SZ'

env:
  CGO_ENABLED: 0
  NEWPATH: "{{.GOPATH}}/bin:{{.PATH}}"

tasks:
  default:
    desc: Run update + build (default action when invoked as `task` with no args).
    cmds:
      - task: update
      - task: build

  update:
    desc: Update Go dependencies (go get -u on module + CLI, then go mod tidy).
    cmds:
      - go get -u
      - go get -u ./cmd/betteralign
      - go mod tidy

  update-plugin:
    desc: Update npm dependencies of the vscode-betteralign extension.
    dir: vscode-betteralign
    cmds:
      - npx npm-check-updates -u --peer
      - npm install
      - npm audit fix

  check:
    desc: List Go modules that have newer major versions available (via gomajor).
    cmds:
      - gomajor list

  fmt:
    desc: Format Go sources with gci (import grouping) and gofumpt (stricter gofmt).
    cmds:
      - gci write .
      - gofumpt -l -w .

  generate:
    desc: Regenerate match_generated.go (DFA matcher for generated-file comments), then format.
    cmds:
      - PATH={{.NEWPATH}} rec -import=unicode/utf8 -pkg betteralign -matchstringutf8=reGeneratedBy '^//\s*Code generated by .* DO NOT EDIT\.$$' > match_generated.go
      - task: fmt

  test:
    desc: Run all Go tests with verbose output.
    cmds:
      - go test -v ./...

  build:
    desc: Build the betteralign CLI with release ldflags (static, stripped, version-stamped, PGO).
    cmds:
      - task: generate
      - task: fmt
      - go build -trimpath -pgo=auto -ldflags="-s -w -extldflags '-static' -X main.Version={{.GIT_LAST_TAG}}{{.GIT_MODIFIED}} -X main.Commit={{.GIT_HEAD_COMMIT}} -X main.Date={{.BUILD_DATE}}" -o {{.TARGET}} ./cmd/betteralign

  build-debug:
    desc: Build with -race and CGO_ENABLED=1 after running update + generate + fmt.
    env:
      CGO_ENABLED: 1
    cmds:
      - task: update
      - task: generate
      - task: fmt
      - go build -ldflags="-X main.Version={{.GIT_LAST_TAG}}{{.GIT_MODIFIED}} -X main.Commit={{.GIT_HEAD_COMMIT}} -X main.Date={{.BUILD_DATE}}" -race -o {{.TARGET}} ./cmd/betteralign

  lint:
    desc: Run golangci-lint (5m timeout) after regenerate + format.
    cmds:
      - task: generate
      - task: fmt
      - golangci-lint run --timeout 5m

  release:
    desc: Cut a release via goreleaser (parallelism 4).
    cmds:
      - goreleaser release --clean -p 4

  fuzz:
    desc: 'Run all native Go fuzz targets (testing.F) sequentially. Override with: task fuzz FUZZTIME=5m (default 30s per target).'
    vars:
      FUZZTIME: '{{.FUZZTIME | default "30s"}}'
    cmds:
      - task: fuzz-optimalorder
        vars: { FUZZTIME: '{{.FUZZTIME}}' }
      - task: fuzz-gcsizes
        vars: { FUZZTIME: '{{.FUZZTIME}}' }
      - task: fuzz-decoratefileidentity
        vars: { FUZZTIME: '{{.FUZZTIME}}' }
      - task: fuzz-decoratefilereorder
        vars: { FUZZTIME: '{{.FUZZTIME}}' }

  fuzz-optimalorder:
    desc: 'Run native FuzzOptimalOrder. Override: task fuzz-optimalorder FUZZTIME=2m (default 30s).'
    vars:
      FUZZTIME: '{{.FUZZTIME | default "30s"}}'
    cmds:
      - go test -run='^$' -fuzz=^FuzzOptimalOrder$ -fuzztime={{.FUZZTIME}} .

  fuzz-gcsizes:
    desc: 'Run native FuzzGCSizes. Override: task fuzz-gcsizes FUZZTIME=2m (default 30s).'
    vars:
      FUZZTIME: '{{.FUZZTIME | default "30s"}}'
    cmds:
      - go test -run='^$' -fuzz=^FuzzGCSizes$ -fuzztime={{.FUZZTIME}} .

  fuzz-decoratefileidentity:
    desc: 'Run native FuzzDecorateFileIdentity. Override: task fuzz-decoratefileidentity FUZZTIME=2m (default 30s).'
    vars:
      FUZZTIME: '{{.FUZZTIME | default "30s"}}'
    cmds:
      - go test -run='^$' -fuzz=^FuzzDecorateFileIdentity$ -fuzztime={{.FUZZTIME}} ./internal/dstmin

  fuzz-decoratefilereorder:
    desc: 'Run native FuzzDecorateFileReorder. Override: task fuzz-decoratefilereorder FUZZTIME=2m (default 30s).'
    vars:
      FUZZTIME: '{{.FUZZTIME | default "30s"}}'
    cmds:
      - go test -run='^$' -fuzz=^FuzzDecorateFileReorder$ -fuzztime={{.FUZZTIME}} ./internal/dstmin

  fuzz-go:
    desc: 'Run all go-fuzz (github.com/dvyukov/go-fuzz) targets sequentially. Override: task fuzz-go FUZZTIME=5m (default 30s per target). FUZZTIME uses timeout(1) syntax: a single number + unit (s/m/h), e.g. 30s, 5m, 2h. Requires go-fuzz/go-fuzz-build installed.'
    vars:
      FUZZTIME: '{{.FUZZTIME | default "30s"}}'
    cmds:
      - task: fuzz-go-optimalorder
        vars: { FUZZTIME: '{{.FUZZTIME}}' }
      - task: fuzz-go-gcsizes
        vars: { FUZZTIME: '{{.FUZZTIME}}' }
      - task: fuzz-go-decoratefileidentity
        vars: { FUZZTIME: '{{.FUZZTIME}}' }
      - task: fuzz-go-decoratefilereorder
        vars: { FUZZTIME: '{{.FUZZTIME}}' }

  fuzz-go-optimalorder:
    desc: 'Run FuzzOptimalOrder under go-fuzz for FUZZTIME (default 30s, timeout(1) syntax).'
    deps: [fuzz-go-build]
    vars:
      FUZZTIME: '{{.FUZZTIME | default "30s"}}'
    cmds:
      - timeout {{.FUZZTIME}} go-fuzz -bin=fuzz/optimalorder-fuzz.zip -workdir=fuzz/optimalorder || [ $? -eq 124 ]

  fuzz-go-gcsizes:
    desc: 'Run FuzzGCSizes under go-fuzz for FUZZTIME (default 30s, timeout(1) syntax).'
    deps: [fuzz-go-build]
    vars:
      FUZZTIME: '{{.FUZZTIME | default "30s"}}'
    cmds:
      - timeout {{.FUZZTIME}} go-fuzz -bin=fuzz/gcsizes-fuzz.zip -workdir=fuzz/gcsizes || [ $? -eq 124 ]

  fuzz-go-decoratefileidentity:
    desc: 'Run FuzzDecorateFileIdentity under go-fuzz for FUZZTIME (default 30s, timeout(1) syntax).'
    deps: [fuzz-go-build]
    vars:
      FUZZTIME: '{{.FUZZTIME | default "30s"}}'
    cmds:
      - timeout {{.FUZZTIME}} go-fuzz -bin=fuzz/decoratefileidentity-fuzz.zip -workdir=fuzz/decoratefileidentity || [ $? -eq 124 ]

  fuzz-go-decoratefilereorder:
    desc: 'Run FuzzDecorateFileReorder under go-fuzz for FUZZTIME (default 30s, timeout(1) syntax).'
    deps: [fuzz-go-build]
    vars:
      FUZZTIME: '{{.FUZZTIME | default "30s"}}'
    cmds:
      - timeout {{.FUZZTIME}} go-fuzz -bin=fuzz/decoratefilereorder-fuzz.zip -workdir=fuzz/decoratefilereorder || [ $? -eq 124 ]

  fuzz-go-corpus:
    desc: Regenerate testdata/fuzz-corpus/ from testdata/src/ for use as a go-fuzz seed corpus.
    run: once
    cmds:
      - rm -rf testdata/fuzz-corpus
      - mkdir -p testdata/fuzz-corpus
      - |
        find testdata -type f \( -name '*.go' -o -name '*.go.golden' \) \
          -not -path 'testdata/fuzz-corpus/*' | while read p; do
            flat=$(echo "${p#testdata/}" | sed 's|/|__|g')
            cp "$p" "testdata/fuzz-corpus/$flat"
          done

  fuzz-go-build:
    desc: 'Build all go-fuzz targets into ./fuzz/. Requires: go install github.com/dvyukov/go-fuzz/go-fuzz-build@latest'
    deps: [fuzz-go-corpus]
    run: once
    cmds:
      - mkdir -p fuzz
      - go-fuzz-build -func=FuzzOptimalOrder         -o fuzz/optimalorder-fuzz.zip          ./
      - go-fuzz-build -func=FuzzGCSizes              -o fuzz/gcsizes-fuzz.zip               ./
      - go-fuzz-build -func=FuzzDecorateFileIdentity -o fuzz/decoratefileidentity-fuzz.zip  ./internal/dstmin
      - go-fuzz-build -func=FuzzDecorateFileReorder  -o fuzz/decoratefilereorder-fuzz.zip   ./internal/dstmin
      - |
        for d in optimalorder gcsizes decoratefileidentity decoratefilereorder; do
          mkdir -p "fuzz/$d/corpus"
          cp -n testdata/fuzz-corpus/* "fuzz/$d/corpus/" 2>/dev/null || true
        done
